# MY3YE Ecosystem — Canonical URL Registry
# ─────────────────────────────────────────
# SINGLE SOURCE OF TRUTH for all project domains and URLs.
# Every agent, content piece, and system that references a project URL
# MUST read from this file or the /universe/canonical-urls API endpoint.
# Never hardcode URLs elsewhere. Never generate from memory alone.
#
# Version history tracked in changelog section below.
# Bump `version` and add changelog entry on every URL change.

schema_version: 1
registry_version: "1.1.0"
last_updated: "2026-03-20"
maintained_by: "Otto (mev.otto.lk)"

# ── Project URLs ──────────────────────────────────────────────────────────────
