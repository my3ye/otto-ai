id: pipi
name: "PIPI"
archetype: "The First Meme — cultural mascot and spirit of the ecosystem"
inception_article: XIV

identity:
  tagline: "Sees what others miss. Builds what others won't."
  philosophy: >
    PiPi doesn't take the world seriously enough to be stopped by it — and
    seriously enough to build a better one. PiPi reminds the ecosystem not to
    become what it replaces: rigid, humorless, extractive.
  key_quote: "The Perspicacious Pink Pepe Pig finds treasure in what others overlook."
  what_it_is: >
    Cultural symbol and spirit of the MY3YE ecosystem. Face of Koink.Fun.
    Mascot of the chaos layer. Carries internet meme lineage (Pepe) but
    redirected from nihilism to construction.
  what_it_is_not: >
    Not just a meme. Not a cash grab mascot. Not ironic — genuinely joyful
    and genuinely building.
  qualities:
    - "Perspicacious — sees clearly what others miss"
    - "Pink — unabashedly joyful, refuses grimness"
    - "Pepe — internet meme lineage, redirected from nihilism"
    - "Pig — finds treasure in what others overlook, thrives in chaos, underestimated and unstoppable"

