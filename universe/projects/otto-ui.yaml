id: otto-ui
name: "OTTO UI"
archetype: "The Interface — universal front-end for the entire ecosystem"
inception_article: null

identity:
  tagline: "One interface. Every protocol. Every device."
  philosophy: >
    Every project in the ecosystem needs a face. Otto UI is the shared design
    system, component library, and UX philosophy that ties them all together.
    Sovereignty should feel consistent, not fragmented.
  key_quote: "The interface is not the experience. But it is how the experience begins."
  what_it_is: >
    Universal interface layer for the MY3YE ecosystem. Shared design system,
    component library, and UX patterns used across all projects. Ensures visual
    and interaction coherence from Tusita dashboards to Panik App to Otto Markets.
    Also serves as the branded UI for Otto AI itself.
  what_it_is_not: >
    Not a standalone product. Not another design tool. The connective tissue
    between every project's user experience.

brand:
  domain: "ottoui.xyz"
  domains_alt: []
  colors:
    primary: "#000000"
    secondary: "#FFFFFF"
    accent: "#4A9EFF"
  aesthetic: "Clean, modular, minimal. Interface disappears and lets the content breathe. Panik aesthetic is the reference point."
  voice: "Functional, confident. The interface speaks through clarity, not words."

