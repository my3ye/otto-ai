id: otto-billboards
name: "OTTO BILLBOARDS"
archetype: "The Signal — decentralized advertising infrastructure"
inception_article: null

identity:
  tagline: "The city's attention, owned by the city."
  philosophy: >
    Billboard companies own the city's eyeballs and capture all the value.
    Otto Billboards redistributes that value to the communities the billboards
    exist in. Community-governed placement, pricing, and content.
    The physical broadcast layer of the MY3YE ecosystem.
  key_quote: "Advertising infrastructure owned by the community it serves."
  what_it_is: >
    Decentralized billboard and out-of-home advertising network. Physical
    digital billboard infrastructure governed by community DAOs. Ad revenue
    flows to local communities, not to distant corporations. Advertiser bids
    go into transparent on-chain pools — community DAO governs content standards,
    pricing, and allocation. AI handles ad categorization and quality filtering
    with open, auditable training. The sovereign ad model made physical: attention
    infrastructure owned and benefited by the people who live near it.
  what_it_is_not: >
    Not another out-of-home advertising company extracting from communities.
    Not opaque corporate content control. Not involuntary surveillance — the
    MY3YE sovereign ad model means viewers' data stays sovereign; advertisers
    reach audiences through consent-based ONEON interest profiles, not tracking.
  features:
    - "Community-owned billboard infrastructure"
    - "DAO governance for content and pricing"
    - "Revenue sharing with local communities"
    - "MY3YE ecosystem broadcast channel"
    - "Integration with Otto Market for local merchant advertising"
    - "Integration with ONEON for verified content provenance"

brand:
  domain: "ottobillboards.xyz"
  domains_alt: []
  colors:
    primary: "#000000"
    secondary: "#FFFFFF"
    accent: "#FFD700"
  aesthetic: "Bold. Large format. The confidence of a message that matters. Physical scale meets digital precision."
  voice: "Bold, direct. Commands attention without begging for it."

