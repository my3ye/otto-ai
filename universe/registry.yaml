# ── Status Legend ──────────────────────────────────────────────────────────────
# live      = deployed, users can interact
# active    = being built, has code/content
# early     = repo exists, shell/placeholder
# concept   = inception article only, no implementation
# blocked   = development paused (with reason)
# planned   = not yet started
