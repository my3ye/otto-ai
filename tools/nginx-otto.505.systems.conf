# nginx config for otto.505.systems
# Proxies to the Otto Memory API on :8100
# Place at: /etc/nginx/sites-available/otto.505.systems
# Enable: sudo ln -s /etc/nginx/sites-available/otto.505.systems /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d otto.505.systems

server {
    listen 80;
    server_name otto.505.systems;

    # Redirect to HTTPS once cert is in place
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8100/leads/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /leads/ {
        proxy_pass http://127.0.0.1:8100/leads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8100/health;
    }
}
